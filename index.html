<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WiFi Survey Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQWu9lNfP0kM8zNMBU8FQeXMK+uHGI=" crossorigin="">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="map-region" aria-label="Survey map">
        <div id="map"></div>
        <div class="topbar">
          <div class="brand-block">
            <h1>WiFi Survey Viewer</h1>
            <p id="datasetName">Loading survey...</p>
          </div>
          <label class="file-control">
            <span>Open GeoJSON</span>
            <input id="fileInput" type="file" accept=".geojson,application/geo+json,application/json">
          </label>
        </div>
        <aside class="control-panel" aria-label="Map controls">
          <label>
            <span>Map metric</span>
            <select id="mapMetric"></select>
          </label>
          <label>
            <span>Timeline metric</span>
            <select id="timelineMetric"></select>
          </label>
          <label>
            <span>Cellular pings</span>
            <select id="cellularFilter">
              <option value="all">Show all pings</option>
              <option value="hide">Hide cellular pings</option>
              <option value="only">Show only cellular pings</option>
            </select>
          </label>
          <label class="map-toggle">
            <input id="showApEstimates" type="checkbox">
            <span>Show AP estimates</span>
          </label>
          <label class="map-toggle">
            <input id="showMapHops" type="checkbox" checked>
            <span>Show AP hop markers</span>
          </label>
          <label class="map-toggle">
            <input id="showHopHeatmap" type="checkbox">
            <span>Show AP hop heatmap</span>
          </label>
          <div class="ap-filter-control">
            <span>AP focus</span>
            <div class="ap-stepper">
              <button id="previousApFilter" type="button" title="Previous connected AP" disabled>&lt;</button>
              <button id="clearApFilter" type="button" title="Clear AP focus" disabled>All APs</button>
              <button id="nextApFilter" type="button" title="Next connected AP" disabled>&gt;</button>
            </div>
            <label class="adjacent-ap-toggle">
              <input id="showAdjacentAps" type="checkbox" disabled>
              <span>Show adjacent APs</span>
            </label>
          </div>
          <div id="legend" class="legend"></div>
          <dl id="summary" class="summary-grid"></dl>
        </aside>
        <div id="hoverCard" class="hover-card" hidden></div>
      </section>

      <section class="timeline-panel" aria-label="Survey timeline">
        <div class="timeline-header">
          <div>
            <h2 id="timelineTitle">Timeline</h2>
            <p id="timelineSubtitle">AP changes are marked along the metric trace.</p>
          </div>
          <div class="timeline-actions" aria-label="Timeline controls">
            <button id="timelineZoomOut" type="button" title="Zoom timeline out">-</button>
            <span id="timelineZoomLabel">1x</span>
            <button id="timelineZoomIn" type="button" title="Zoom timeline in">+</button>
            <button id="timelineZoomReset" type="button" title="Reset timeline zoom">Reset</button>
            <button id="clearSelection" type="button" title="Clear selected point">Clear</button>
          </div>
        </div>
        <div id="timelineWrap" class="timeline-wrap">
          <svg id="timelineSvg" role="img" aria-label="Metric timeline"></svg>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
  </body>
</html>
